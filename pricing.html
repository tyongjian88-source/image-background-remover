<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>定价 - AI 抠图</title>
<script src="https://www.paypal.com/sdk/js?client-id=ATu2bK9T85J56j0-L40yJ0D7rS3pLq1O_47z3gQeQk9nS6yY4O47S2u_z1b63H52uS1I7g5lKz4n0L3x&currency=USD"></script>
<style>
  body { font-family: sans-serif; text-align: center; padding: 50px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 900px; margin: auto; }
  .card { border: 1px solid #ccc; padding: 20px; border-radius: 10px; }
</style>
</head>
<body>
  <h1>选择您的积分包</h1>
  <div class="grid">
    <div class="card">
      <h3>入门包 (10次)</h3>
      <p>$4.99</p>
      <div id="paypal-p10"></div>
    </div>
    <div class="card">
      <h3>热门包 (30次)</h3>
      <p>$12.99</p>
      <div id="paypal-p30"></div>
    </div>
    <div class="card">
      <h3>专业包 (80次)</h3>
      <p>$29.99</p>
      <div id="paypal-p80"></div>
    </div>
  </div>

  <script>
    const API_BASE = 'https://image-bg-remover-api.tyongjian88.workers.dev';
    const session = localStorage.getItem('session');

    ['p10', 'p30', 'p80'].forEach(plan => {
      paypal.Buttons({
        createOrder: async () => {
          const res = await fetch(API_BASE + '/paypal/create', {
            method: 'POST',
            body: JSON.stringify({ plan })
          });
          const data = await res.json();
          return data.id;
        },
        onApprove: async (data) => {
          const res = await fetch(API_BASE + '/paypal/capture', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + session },
            body: JSON.stringify({ orderID: data.orderID, plan })
          });
          if ((await res.json()).success) alert('支付成功，额度已到账！');
          else alert('支付校验失败，请联系客服');
        }
      }).render('#paypal-' + plan);
    });
  </script>
</body>
</html>
